# Signature template (sigmatcher / offline dialect).
#
# One file per app under signatures/<app>/signatures.yaml. Signatures are
# multi-version on purpose: anchor on rotation-stable evidence so the same
# rules resolve across point releases.
#
# Each top-level entry identifies ONE class; nested `methods` / `fields`
# refine members within a matched class. Prefer, in order (generic-first —
# these work for any class, so they are the default):
#   1. stable string literals reached by live code (endpoint URLs, log tags,
#      `static final String` constants, field/key names)
#   2. stable framework superclass / interface refs (an obfuscated class still
#      extends a non-rotating android/androidx/java parent)
#   3. cross-class / structural anchors (a resolved class's descriptor
#      referenced elsewhere, a distinctive constant or method-table shape)
#   4. AIDL / Binder descriptor strings — a lucky SPECIAL CASE *when present*
#      (a `.Stub` embeds its binder descriptor verbatim and it never rotates,
#      but most classes have no AIDL contract, so this is the exception)

- name: 'RealClassName'
  package: 'com.example.yourapp'
  signatures:
      - signature: '"a stable string literal in this class"'
        type: regex
        count: 1
  fields:
      - name: 'realFieldName'
        signatures:
            - signature: 'realFieldName'
              type: regex
              count: 1
  methods:
      - name: 'realMethodName'
        signatures:
            - signature: 'realMethodName\(Ljava/lang/String;\)V'
              type: regex
              count: 1

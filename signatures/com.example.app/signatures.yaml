# Example sigmatcher signatures for com.example.app — the SOURCE OF TRUTH
# from which maps/com.example.app/<version_code>.json is generated
# (RFC 0001 Decision 4). This is the offline / host dialect: human-readable
# regex-over-smali, multi-version, FOSS-correct (a map is reproducible from
# these signatures + the APK, which is what makes it verifiable).
#
# The on-device / runtime dialect (DexKit queries) is a separate, parallel
# form harvested one-time into this format; see RFC 0001 Decision 5. Do not
# invent a third "unified" signature format here.
#
# Anchoring strategy: pin each class on the most rotation-stable evidence
# available, generic-first. In rough order of preference:
#   1. stable string literals reached by live code (endpoint URLs, log tags,
#      field/key names) — the default, works for any class.
#   2. stable framework superclass / interface refs (an obfuscated class still
#      extends a non-rotating android/androidx/java parent).
#   3. stable constants (a `static final` value or magic number).
#   4. structural / cross-class anchors (a resolved class's descriptor
#      referenced elsewhere, a distinctive method-table shape).
#   5. AIDL / Binder descriptor strings — a lucky SPECIAL CASE *when present*:
#      a `.Stub` embeds its binder descriptor verbatim and it never rotates,
#      but most classes have no AIDL contract, so this is the exception, not
#      the rule.
# The point is the same either way: the rules resolve across adjacent point
# releases even as obfuscated names rotate.

# ─── Rotating Java class — anchored on a stable string literal (the
# default, generic strategy: most classes have no AIDL contract) ─────
- name: 'RemoteServiceClient'
  package: 'com.example.app'
  signatures:
      - signature: 'sessionId'
        type: regex
        count: 1
  fields:
      - name: 'sessionId'
        signatures:
            - signature: 'sessionId'
              type: regex
              count: 1
  methods:
      - name: 'requestTicket'
        signatures:
            - signature: 'requestTicket\(Landroid/os/Bundle;\)'
              type: regex
              count: 1

# ─── Constants holder — identified by an endpoint string literal ─────
- name: 'Config'
  package: 'com.example.app'
  signatures:
      - signature: '"https://.*\.example/api"'
        type: regex
        count: 1
  fields:
      - name: 'ENDPOINT_URL'
        signatures:
            - signature: '"https://.*\.example/api"'
              type: regex
              count: 1

# ─── AIDL contract — a lucky special case WHEN PRESENT ───────────────
# The .Stub nested class embeds its binder descriptor string verbatim;
# that string is a non-rotating anchor — but only AIDL/Binder classes have
# one, so this strategy is the exception, not the default.
- name: 'IRemoteService$Stub'
  package: 'com.example.app'
  signatures:
      - signature: '"com\.example\.app\.IRemoteService"'
        type: regex
        count: 1
  methods:
      - name: 'requestTicket'
        signatures:
            - signature: '\(Landroid/os/Bundle;L[a-z]+;\)V'
              type: regex
              count: 1-2

- name: 'IServiceCallback'
  package: 'com.example.app'
  signatures:
      - signature: '"com\.example\.app\.IServiceCallback"'
        type: regex
        count: 1

# Central domain config: api/xapi/pull/build/site/support hosts for both
# ticktick.com and dida365.com; getApiDomain()/isDidaEnv().
- name: 'BaseUrl'
  package: 'com.ticktick.task.helper'
  signatures:
      - signature: '"\*\.dida365\.com"'
        type: regex
        count: 1

# Per-environment host bundle factory (getReleaseTick/getReleaseDida/…),
# incl. the pomodoro WebSocket URLs. The host strings live in the Companion.

# sigmatcher signatures for com.ticktick.task (TickTick / Dida365 — to-do app).
# SOURCE OF TRUTH for maps/com.ticktick.task/<version_code>.json (RFC 0001 Decision 4).
# Offline / host dialect: human-readable regex-over-smali, multi-version.
#
# INTRODUCTORY mapping — authored against version_code 8081 / versionName
# 8.0.8.1, then MULTI-VERSION-HARDENED: all 66 rules verified to resolve with
# zero failures on BOTH version_code 8081 (8.0.8.1) and 8080 (8.0.8.0) — which
# is why there is a map per version under maps/com.ticktick.task/. The test
# bit: 5 renamed helpers ROTATED their obfuscated tokens between the two
# releases (AiComplete q9.x0->q9.w0, LoginHandler j8.m->j8.n, RequestUser
# h8.l->h8.n, ResponseUser h8.m->h8.o, TwoFactorLoginHandler j8.n->j8.o) and
# the anchors below tracked every one. Note j8.n is LoginHandler in 8081 but
# TwoFactorLoginHandler in 8080 — proof the obfuscated name is worthless across
# versions and the anchor IS the identity.
#
# Obfuscation profile (see research/com.ticktick.task/docs/orientation.md):
# TickTick is R8-minified with a WIDE carve-out — the whole
# com.ticktick.task.* business tree keeps readable package/class/member names
# (incl. the 18 Retrofit API interfaces, the data entities, and the helper.*
# classes), while bundled third-party libs and a minority of internal
# helper/lambda classes are renamed to short tokens (y7.a, w7.b, j8.m, vd.d…).
#
# Anchoring strategy, in order of preference, all verified GLOBALLY UNIQUE:
#   1. For the API interfaces — the REST PATH string from a @GET/@POST
#      annotation (paths rotate far less than names and are unique per route).
#   2. For renamed helpers — the retained SourceFile string ("Foo.java" /
#      "Foo.kt"). R8 keeps SourceFile here, so it still spells the ORIGINAL
#      class name even after the class token rotates → both proves identity
#      AND survives rotation. (Used only where the source maps to ONE smali
#      file; Kotlin classes whose lambdas/inner classes share the SourceFile
#      string are anchored on an in-body literal instead.)
#   3. A class-unique business string literal (log tag, toString prefix,
#      error message, descriptor that names the class's own inner type).
# Most com.ticktick.task.* classes resolve to THEMSELVES; the map certifies
# that for 8081 and will catch the release that finally rotates one.

# ════════════════════════════════════════════════════════════════════════
# NETWORK — host foundation (research/.../docs/network-api.md)
# ════════════════════════════════════════════════════════════════════════

# Central domain config: api/xapi/pull/build/site/support hosts for both
# ticktick.com and dida365.com; getApiDomain()/isDidaEnv().
- name: 'BaseUrl'
  package: 'com.ticktick.task.helper'
  signatures:
      - signature: '"\*\.dida365\.com"'
        type: regex
        count: 1

# Per-environment host bundle factory (getReleaseTick/getReleaseDida/…),
# incl. the pomodoro WebSocket URLs. The host strings live in the Companion.
- name: 'ServerHostConfig$Companion'
  package: 'com.ticktick.task.helper'
  signatures:
      - signature: '"Build/Api"'
        type: regex
        count: 1

# Abstract per-request URL builder (Tick/Dida subclasses flip host by
# account + locale + isIpInChina).
- name: 'HttpUrlBuilderBase'
  package: 'com.ticktick.task.helper'
  signatures:
      - signature: '"/webview/datalist/infoCollected"'
        type: regex
        count: 1

# TickTick URL builder (carries the MS-To-Do import client-id GUID).
- name: 'HttpUrlBuilderTick'
  package: 'com.ticktick.task.helper'
  signatures:
      - signature: 'https://ms\.ticktick\.com'
        type: regex
        count: 1

# Dida URL builder (its own MS-To-Do client-id GUID).
- name: 'HttpUrlBuilderDida'
  package: 'com.ticktick.task.helper'
  signatures:
      - signature: 'https://ms\.dida365\.com'
        type: regex
        count: 1


# ════════════════════════════════════════════════════════════════════════
# ACCOUNT — model, manager, profile/config, deletion (docs/account.md)
# ════════════════════════════════════════════════════════════════════════

# Local account entity (GreenDAO + Parcelable). Pro = proType==1 ||
# isActiveTeamUser(); accountType==4 is local mode. accessToken lives here.
- name: 'User'
  package: 'com.ticktick.task.data'
  signatures:
      - signature: '"\*\*\*\*@"'
        type: regex
        count: 1
  methods:
      # requireDisplayName()String — masks the e-mail to "****@domain" for the UI.
      - name: 'requireDisplayName'
        signatures:
            - signature: '"\*\*\*\*@"'
              type: regex
              count: 1
      # isDidaAccount()Z — true for the dida365 (China) account domain.
      - name: 'isDidaAccount'
        signatures:
            - signature: '"ticktick"'
              type: regex
              count: 1
      # Stringless accessors below carry no in-body literal, so they are anchored
      # on the .method DECLARATION line (name + descriptor). The leading `\.method`
      # pins the match to the declaration and excludes call sites in other method
      # bodies (each split chunk holds exactly one `.method` token). Robust ONLY
      # because these are kept carve-out names that do not rotate; the captured
      # descriptor is the params/return identity.
      # getAccessToken()String — the OAuth bearer token (prime hook target).
      - name: 'getAccessToken'
        signatures:
            - signature: '\.method public getAccessToken\(\)Ljava/lang/String;'
              type: regex
              count: 1
      # getSid()String — server-side user id.
      - name: 'getSid'
        signatures:
            - signature: '\.method public getSid\(\)Ljava/lang/String;'
              type: regex
              count: 1
      # isPro()Z — the per-user Pro flag.
      - name: 'isPro'
        signatures:
            - signature: '\.method public isPro\(\)Z'
              type: regex
              count: 1
      # getProType()I — Pro tier code (1 == pro).
      - name: 'getProType'
        signatures:
            - signature: '\.method public getProType\(\)I'
              type: regex
              count: 1
      # getApiDomain()String — the account's API host.

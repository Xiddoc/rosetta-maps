# Local AES helper (AES/ECB/PKCS5Padding, key right-padded to 32 bytes) used for
# at-rest value encryption — a prime hook point for reading plaintext. No inner
# classes, so the retained SourceFile is a safe count==1 anchor.
- name: 'AESUtils'
  package: 'com.ticktick.task.utils'
  signatures:
      - signature: '"AESUtils\.java"'
        type: regex
        count: 1
  methods:
      # createKey(String)SecretKeySpec — derives the AES key (right-pads/truncates
      # to 32 bytes, "AES" algorithm). Anchored on the class-unique bare "AES"
      # algorithm literal. The encrypt/decrypt pairs are intentionally NOT mapped:
      # the two byte[] variants share the same "AES/ECB/PKCS5Padding" literal and
      # carry no per-method-unique anchor (would be ambiguous within the class).
      - name: 'createKey'
        signatures:
            - signature: '"AES"'
              type: regex
              count: 1


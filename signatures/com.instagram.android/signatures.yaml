# Sigmatcher signatures for com.instagram.android (Instagram for Android).
# SOURCE OF TRUTH for maps/com.instagram.android/<version_code>.json.
#
# Scope (authored in three rounds; provenance kept here rather than in the map
# JSON, where free-form notes have no reader):
#   * Round 1 (login/auth core) — the LOGIN + SIGN-UP/registration HTTP surface,
#     client-side password encryption, device identity & request signing,
#     keystore secure-storage crypto, realtime/MQTT + FBNS push, MSYS DM mailbox,
#     the media upload/configure pipeline, MobileConfig feature gating, the Bloks
#     action registry, analytics upload, and the feed/stories/reels HTTP surface.
#     Sign-up adds account creation, phone/email confirmation, FB sign-up (folded
#     into IgAccountsLoginApi), the age gate & new-user consent flow, and contact
#     prefill.
#   * Round 2 (feature-subsystem expansion) — 26 subsystems: Meta AI / AI Studio,
#     QuickSnap, Friend Map, Direct/MSYS/E2EE, RTC, Reels/clips, Stories, Close
#     Friends, Shopping/Commerce, Branded Content, IG Live, Live monetization,
#     Supervision, Family Center, Wellbeing/Screen Time, Notifications, Avatars,
#     AR effects, Payments/FBPay, Creator subscriptions, Notes, Broadcast
#     Channels, Auth/Login, 2FA/Security, Realtime/MQTT, Comments. Members are
#     A0x-rotated and not mapped (class-level only).
#   * Round 3 (further expansion) — 20 more subsystems: Explore, Search, Feed
#     ranking, Saved/Collections, Quick Experiment, Quick Promotion, Meta
#     Verified, Account switching, Sticker/GIPHY, Music, In-app browser, Media
#     upload, Analytics/Profilo, Zero-rating, Lead Ads, Tagging, Community Notes,
#     Fundraisers, Bloks, Pando/GraphQL.
# See research/com.instagram.android/docs/ for what each class does.
#
# Obfuscation model (see research/.../login-http-api.md):
#   * First-party feature PACKAGES are mostly preserved
#     (com.instagram.login.*), but the bulk of logic is flattened into a
#     synthetic `X` package (LX/55W;, LX/ioi;, ...). Those short tokens
#     ROTATE every release and must never be used as anchors.
#   * String literals survive: API endpoint paths, POST field names, analytics
#     event names, and the bundled bootstrap public key. Every class below is
#     anchored on a string literal that was verified GLOBALLY UNIQUE across all
#     19 dex files in this APK (rg -l count == 1), so it identifies exactly one
#     class and survives name rotation.
#
# NOTE: anchors here were uniqueness-checked against v433.0.0.47.68 only.
# Cross-version verification (the real portability test) requires a second
# APK; see research/.../README.md.

# ─────────────────────────────────────────────────────────────────────
# Login / account API factory. One class builds every auth endpoint.
# Anchored on the primary login path; each method re-anchored on its own
# unique endpoint literal.
# ─────────────────────────────────────────────────────────────────────
- name: 'IgAccountsLoginApi'
  package: 'com.instagram.login.api'
  signatures:
      - signature: '"accounts/login/"'
        type: regex
        count: 1
  methods:
      - name: 'login'
        signatures:
            - signature: '"accounts/login/"'
              type: regex
              count: 1
      - name: 'oneTapAppLogin'
        signatures:
            - signature: '"accounts/one_tap_app_login/"'
              type: regex
              count: 1
      # FB sign-up surface on this same factory (added by the sign-up work):
      # create an IG account from a Facebook token, and link FB during NUX.
      - name: 'facebookSignup'
        signatures:
            - signature: '"fb/facebook_signup/"'
              type: regex
              count: 1
      - name: 'nuxFbConnect'
        signatures:
            - signature: '"fb/nux_fb_connect/"'
              type: regex
              count: 1
      - name: 'accountRecoveryCodeLogin'
        signatures:
            - signature: '"accounts/account_recovery_code_login/"'
              type: regex
              count: 1
      - name: 'accountRecoveryCodeVerify'
        signatures:
            - signature: '"accounts/account_recovery_code_verify/"'
              type: regex
              count: 1
      - name: 'assistedAccountRecovery'
        signatures:
            - signature: '"accounts/assisted_account_recovery/"'
              type: regex
              count: 1
      - name: 'sendPasswordReset'
        signatures:
            - signature: '"accounts/send_password_reset/"'
              type: regex
              count: 1
      - name: 'sendRecoveryFlowEmail'
        signatures:
            - signature: '"accounts/send_recovery_flow_email/"'
              type: regex
              count: 1
      - name: 'googleTokenUsers'
        signatures:
            - signature: '"accounts/google_token_users/"'
              type: regex
              count: 1


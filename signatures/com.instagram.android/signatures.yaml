# ══════════════════════════════════════════════════════════════════
# SIGN-UP / REGISTRATION HTTP SURFACE
# ──────────────────────────────────────────────────────────────────
# Account creation, phone/email confirmation, FB/one-tap sign-up, the
# age gate & new-user consent flow, contact prefill. Complements the
# login/auth surface above. Anchored on globally-unique server endpoint
# path string literals (the obfuscated X. tokens rotate per release).
# Narrative: research/com.instagram.android/docs/signup-http.md
# ══════════════════════════════════════════════════════════════════

# ─── accounts/create/  +  accounts/create_validated/ ────────────────
# Primary account-creation request builder. Reads RegFlowExtras +
# UserBirthDateImpl, attaches device ids / waterfall id, and (for supervised
# accounts) the guardian consent token. Path switches create/ vs
# create_validated/ on an Integer flag.
- name: 'AccountCreateApi'
  package: 'com.instagram.api.signup'
  signatures:
      - signature: '"accounts/create/"'
        type: regex
        count: 1
      - signature: '"accounts/create_validated/"'
        type: regex
        count: 1
  methods:
      - name: 'createRequest'
        signatures:
            - signature: '"accounts/create/"'
              type: regex
              count: 1

# ─── accounts/create_business/ (+ create_business_validated/) ────────
# Business / professional-account creation. Carries enc_password (sealed,
# see PasswordEncryptor), category_id, page_id, professional_signup_source_*.
# The same builder method emits create_business/ vs create_business_validated/
# on a flag, so create_business_validated/ is a second class-level anchor
# (NOT a second method — both live in the one run()V).
- name: 'AccountCreateBusinessApi'
  package: 'com.instagram.api.signup'
  signatures:
      - signature: '"accounts/create_business/"'
        type: regex
        count: 1
      - signature: '"accounts/create_business_validated/"'
        type: regex
        count: 1
      - signature: '"enc_password"'
        type: regex
        count: 1-3
  methods:
      - name: 'createBusinessRequest'
        signatures:
            - signature: '"accounts/create_business/"'
              type: regex
              count: 1

# ─── multiple_accounts/create_secondary_account/ (+ ..._ai_account/) ─
# Add-account flow from an already-logged-in session. Passes
# main_user_id / main_user_authorization_token and the should_*_to_main
# consent/birthday-copy flags. The same builder method switches the path to
# create_secondary_ai_account/ for the AI-character secondary-account variant,

# ─────────────────────────────────────────────────────────────────────
# Client-side password encryption (enc_password). See
# research/.../password-encryption.md.
# ─────────────────────────────────────────────────────────────────────
# The encrypter: formats <tag>:<version>:<key_id>:<base64> and logs an
# attempt. Two independent unique anchors (analytics event + transient tag).
- name: 'IgPasswordEncrypter'
  package: 'com.instagram.login.encryption'
  signatures:
      - signature: '"instagram_client_password_encryption_encrypt_attempt"'
        type: regex
        count: 1
      # bootstrap/transient tag, emitted at two sites in this class
      - signature: '"#PWD_TRANSIENT"'
        type: regex
        count: 2
  methods:
      # A00(Ljava/lang/String;)Ljava/lang/String;  plaintext -> enc_password
      - name: 'encryptPassword'
        signatures:
            - signature: '"instagram_client_password_encryption_encrypt_attempt"'
              type: regex
              count: 1


# ══════════════════════════════════════════════════════════════════════════
# BACKUPS subsystem (Google-Drive .daylio archive + asset sync) — hardened multi-version (252 + 267) 2026-06-09
# ══════════════════════════════════════════════════════════════════════════
# Cross-version target: version_code 252 (1.63.12) AND 267 (1.65.5).
# Every anchor below is proven present + unique in BOTH version trees, and
# references NO obfuscated type (so it survives R8 name rotation).
# Re-anchored: BackupPersistenceModule, BackupData(DROPPED), BackupMetadata.fromJson,
# DriveBackupService(DROPPED). All other entries are byte-identical to the
# committed signatures.yaml BACKUPS block.

# ─── BackupMetadata (252 sd.a → 267 mi.a) ────────────────────────────────────
# CLASS anchor "Metadata{m_numberOfEntries=" + "photos_size" already resolve on
# BOTH versions — left byte-identical. toJson()->JSONObject is framework-only and
# already stable. ONLY fromJson was re-anchored: its old descriptor
# (Lorg/json/JSONObject;)Lsd/a; referenced the rotated return type (sd.a→mi.a),
# so it is now pinned on a framework-only JSONObject reader call that occurs
# exactly once in this class, inside the parse factory body.
- name: 'BackupMetadata'
  package: 'sd'
  signatures:
      - signature: '"Metadata\{m_numberOfEntries="'
        type: regex
        count: 1
      # "photos_size" JSON key — appears twice in this class (toJson + fromJson).
      - signature: '"photos_size"'
        type: regex
        count: 2
  methods:
      # static a(JSONObject) -> BackupMetadata : the JSON parse factory.
      # Re-anchored (was '(Lorg/json/JSONObject;)Lsd/a;', return type rotated).
      # optBoolean(String,Z)Z is called exactly once in this class and only in
      # the parse body (toJson uses put*), so it pins fromJson without naming the
      # obfuscated return type. Framework descriptor → rotation-stable.
      - name: 'fromJson'
        signatures:
            - signature: 'Lorg/json/JSONObject;->optBoolean\(Ljava/lang/String;Z\)Z'
              type: regex
              count: 1
      # toJson() -> JSONObject : serialise back to a JSONObject. (unchanged)
      - name: 'toJson'
        signatures:
            - signature: '\(\)Lorg/json/JSONObject;'
              type: regex
              count: 1

# ─── BackupData — DROPPED (see findings) ─────────────────────────────────────
# 252 sd.b held {String payload, BackupMetadata} and wrote the inner "*.daylio"
# file itself via b(File)/c(File) (Base64+UTF-8). On 267 the class was SPLIT: the
# successor mi.d is now just a {File, BackupMetadata} pair — the payload string
# and the Base64/UTF-8 write logic moved into a separate class (267 ed.q / f9.d).
# mi.d is stringless and its only content references the obfuscated type Lmi/a;.
# There is no rotation-stable, non-obfuscated, class-unique anchor in EITHER
# version (252 sd.b's sole string "UTF-8" is not app-wide unique; mi.d has no
# strings). Re-anchoring would require referencing the rotating type Lmi/a; —
# exactly what the hardening rules forbid — so BackupData and its getMetadata
# member are dropped. The class-level map loss is contained: BackupMetadata
# (mi.a) is still mapped, which is the meaningful half of the pair.

# ─── BackupPersistenceModule (252 net.daylio.modules.s → 267 .t) ─────────────
# The real serializer/restorer. Old anchor "last_backup.json" is GONE in 267
# (the JSON scratch-file step was removed: 0 occurrences app-wide). The class is
# string-poor — its only literal common to both versions is "backup" (the
# filesDir/backup staging-dir name), which is NOT app-wide unique (3 files each).
# Hardened with a CONJUNCTION that is unique to this class in BOTH versions:
# the "backup" dir literal AND a framework getFilesDir() call in the same file
# (the private dir-builder new File(getFilesDir(), "backup")). Neither anchor
# references an obfuscated type. Verified: the only file carrying BOTH is
# 252 modules/s.smali and 267 modules/t.smali.
- name: 'BackupPersistenceModule'
  package: 'net.daylio.modules'
  signatures:
      - signature: '"backup"'
        type: regex
        count: 1
      - signature: 'getFilesDir\(\)Ljava/io/File;'
        type: regex
        count: 1
  # getLastBackupFile member DROPPED: its 252 method a()->File built
  # filesDir/backup/last_backup.json; on 267 that scratch file and the method are
  # gone entirely (no a()Ljava/io/File; here; restore now takes a JSONObject
  # directly). Nothing stable to anchor — dropped honestly.

# ─── Asset sync trigger module (assets.p / iface assets.s) — UNCHANGED ────────
# Resolved on both versions; anchors left byte-identical.
- name: 'AssetsSyncModule'
  package: 'net.daylio.modules.assets'

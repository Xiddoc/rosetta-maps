# ─── DriveBackupService — DROPPED (see findings) ─────────────────────────────
# 252 net.daylio.modules.drive.a / iface drive.d. The class TOKEN is actually
# stable across these two releases (still drive.a impl drive.d on 267, and its
# sibling DriveServiceModule is drive.c on both), BUT the top-level a.smali has
# no usable cross-version anchor:
#   • 252 drive/a.smali is completely stringless (0 const-strings).
#   • 267 drive/a.smali has only "tmp_backup_" and ".json", both ABSENT in 252
#     (a 267-only temp-file upload path) — version-specific, not valid anchors.
#   • Its stable, app-unique drive_backup_*cleanup* strings
#     ("drive_backup_assets_cleanup_success", "err_drive_backup_cleanup_error",
#     "err_drive_backup_assets_cleanup_error", "assets_deleted") live in INNER
#     classes (a$d, a$d$a), NOT in the top-level class file, so they cannot
#     anchor drive.a itself.
#   • Every method on a.smali references an obfuscated type (sd.b/mi.d, r7.a/jc.a,
#     drive.d$c, ad.c/vh.c prefs) or a generic framework call.
# The only top-level-class anchor would be '.implements Lnet/daylio/modules/
# drive/d;' — a single-letter obfuscated interface token, exactly the fragile
# kind the hardening rules forbid. Per the task's explicit guidance, DROP rather
# than ship a fragile one-version anchor. (Its data class & query util above
# remain mapped, and BackupModule m/n still covers the high-level flow.)

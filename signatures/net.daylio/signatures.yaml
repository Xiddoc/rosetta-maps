# ══════════════════════════════════════════════════════════════════════════
# PREMIUM subsystem (billing + the is-premium gate) — hardened multi-version (252 + 267) 2026-06-09
# ══════════════════════════════════════════════════════════════════════════
# Authored vs version_code 252 (1.63.12); cross-version-hardened vs 267 (1.65.5).
# Class anchors UNCHANGED (resolved on both). Members re-anchored on
# rotation-stable evidence (in-body string literals, or the class's unique
# public no-arg ()Z descriptor) — never on the obfuscated method name.

# ─── Premium-status PROVIDER / GATE — net.daylio.modules.purchases.j impl ──
# Class `d0` implements the purchases-manager interface `j`. It owns premium
# state: isPremium reads it; the private writer unconditionally sets the premium
# pref TRUE; onPremiumLost clears it; the subscribe/lifetime/subscription-restore
# entry points funnel into the writer. HIGH confidence (identity confirmed in
# code, not just anchor).
- name: 'PremiumStatusManager'
  package: 'net.daylio.modules.purchases'
  signatures:
      - signature: '"onPremiumLost"'
        type: regex
        count: 1
  methods:
      # THE is-premium accessor. Returns the persisted premium boolean.
      # *** Single best hook point. ***
      # Re-anchored on the class's UNIQUE public no-arg ()Z descriptor (verified
      # the only `public <name>()Z` in d0 on BOTH 252 & 267). The previous
      # name-bound anchor `u6` rotated to `l4` on 267. No in-body string exists
      # in this body to anchor on, and the field-read it performs (premium pref)
      # is shared with the sibling o()/t() callback, so the descriptor is the
      # only stable, in-class-unique discriminator.
      - name: 'isPremium'
        signatures:
            - signature: '\.method public \w+\(\)Z'
              type: regex
              count: 1
      # onPremiumSubscribed(String sku) — subscribe success → grants premium.
      # Re-anchored on the in-body log literal (present in both versions).
      # Name rotated u  I7 (252) → Nc (267).
      - name: 'onPremiumSubscribed'
        signatures:
            - signature: '"onPremiumSubscribed - "'
              type: regex
              count: 1
      # onPremiumLifetimeRestored(long) — lifetime/playpass restore.
      # Re-anchored on the in-body log literal (present in both versions).
      # Name rotated T9 (252) → M5 (267).
      - name: 'onPremiumLifetimeRestored'
        signatures:
            - signature: '"onPremiumLifetimeRestored - lifetime"'
              type: regex
              count: 1
      # onPremiumSubscriptionRestored() — subscription restore → grants premium.
      # Re-anchored on the in-body log literal (present in both versions).
      # Name rotated fb (252) → p6 (267).
      - name: 'onPremiumSubscriptionRestored'
        signatures:
            - signature: '"onPremiumSubscriptionRestored"'
              type: regex
              count: 1
      # onPremiumLost() — clears the premium boolean.
      # Re-anchored on the in-body "onPremiumLost" log literal — the SAME string
      # used as the class anchor, which lives inside this method body (verified
      # in both versions). Name rotated Y0 (252) → cg (267, now takes a param).
      - name: 'onPremiumLost'
        signatures:
            - signature: '"onPremiumLost"'
              type: regex
              count: 1

# ─── Central PREFERENCES registry holding the premium boolean ─────────────
# Anchored on the unique preference-name literal. HIGH confidence. Class-level
# only (typed-key inner class has no unique anchor; the premium key's
# const-string sits in <clinit>, not the field region).
- name: 'Prefs'
  package: 'ad'
  signatures:
      - signature: '"IS_PRO_VERSION_PURCHASED"'
        type: regex
        count: 1

# ─── Google-Play BILLING client wrapper ───────────────────────────────────
# Real billing facade. Anchored on the unique "getBillingClientAsync" task
# literal in the class body. HIGH confidence. Class-level only.
- name: 'BillingClientWrapper'
  package: 'net.daylio.modules.purchases'
  signatures:
      - signature: '"getBillingClientAsync"'
        type: regex
        count: 1

# ─── Purchase / premium-RESTORE coordinator ────────────────────────────────
# Drives premium restore (queries owned inapp+subs purchases, validates, grants).
# Anchored on a restore-flow log literal. HIGH confidence.
- name: 'PremiumRestoreModule'
  package: 'net.daylio.modules.purchases'
  signatures:
      - signature: '"Premium restore STARTED with force "'
        type: regex
        count: 1
  methods:
      # isRestoreInProgress() : Z
      # Re-anchored on the class's UNIQUE public no-arg ()Z descriptor (verified
      # the only `public <name>()Z` in e0 on BOTH 252 & 267; both read a
      # purchases/k flag and delegate to the superclass helper). Name rotated
      # hd (252) → r7 (267).
      - name: 'isRestoreInProgress'
        signatures:
            - signature: '\.method public \w+\(\)Z'
              type: regex
              count: 1

# ─── Product / SKU enum ─────────────────────────────────────────────────────
# Enum mapping Daylio's premium products to Google-Play product IDs. Anchored on
# the globally-unique enum-constant name. HIGH confidence. Class-level only.
- name: 'ProductSku'
  package: 'md'
  signatures:
      - signature: '"PREMIUM_LIFETIME"'
        type: regex
        count: 1

# ─── Special-offer / trial scheduler ───────────────────────────────────────
# Schedules special-offer alarms, tracks running offer, gates on premium.
# Anchored on a unique human-readable log literal in the class body. HIGH

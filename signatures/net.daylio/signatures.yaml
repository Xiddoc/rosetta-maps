# sigmatcher signatures for net.daylio (Daylio — mood & health tracker).
# SOURCE OF TRUTH for maps/net.daylio/<version_code>.json (RFC 0001 Decision 4).
# Offline / host dialect: human-readable regex-over-smali, multi-version.
#
# First pass — INTRODUCTORY mapping (version_code 252 / versionName 1.63.12).
# Daylio is R8-minified with the usual carve-out: framework-instantiated
# classes (Application, Activities — referenced by name from the manifest) keep
# their names, while internal logic is renamed. The package PATH net.daylio.* is
# preserved even where the class name is rotated to a short token. Its service
# layer lives in net.daylio.modules.* as single-letter classes behind obfuscated
# interfaces — those rotate between releases and are the real reason this map
# exists. Every signature below is anchored on a GLOBALLY-UNIQUE string literal
# (verified to occur in exactly one class app-wide) so it resolves unambiguously
# and survives name rotation.

# ─── Kept entry points (name not obfuscated; useful client hook landmarks) ───

# Application subclass named in AndroidManifest (android:name) → name retained.
- name: 'MyApplication'
  package: 'net.daylio'
  signatures:
      - signature: '"Noto Color Emoji Compat"'
        type: regex
        count: 1

# Launcher activity (MAIN/LAUNCHER in the manifest) → name retained. This is
# the home / overview screen.
- name: 'OverviewActivity'
  package: 'net.daylio.activities'
  signatures:
      - signature: '"spread_buttons_new_milestone_created"'
        type: regex
        count: 1

# ─── Obfuscated service modules (net.daylio.modules.*) — the map's real value ─

# Google-Drive backup/restore. Anchored on a backup-integrity error string.
# Reads/writes backup_*.daylio archives; net.daylio.data.exceptions imports.
- name: 'BackupModule'
  package: 'net.daylio.modules'
  signatures:
      - signature: '"Metadata are missing in backup!"'
        type: regex
        count: 1

# Mood-icon / emoji pack management (the selectable mood-icon tabs).
- name: 'MoodIconPackModule'
  package: 'net.daylio.modules'
  signatures:
      - signature: '"emoji_tab_first_from_"'
        type: regex
        count: 1

# Daily reminder scheduling + the battery-optimisation permission dialog flow.
- name: 'ReminderModule'
  package: 'net.daylio.modules'
  signatures:
      - signature: '"reminder_bat_optim_dialog_shown"'
        type: regex
        count: 1

# Entry/stats data provider — serves entries over date ranges to the charts
# layer. Identity inferred from method-name string literals; MEDIUM confidence,
# revisit when member-level signatures are added.
- name: 'EntriesDataProvider'
  package: 'net.daylio.modules'
  signatures:
      - signature: '"getEntriesInDateRange"'
        type: regex
        count: 1

# ══════════════════════════════════════════════════════════════════════════
# EXPORTS subsystem (user-facing CSV + PDF export) — hardened multi-version (252 + 267) 2026-06-09
# ══════════════════════════════════════════════════════════════════════════
# Authored against version_code 252; re-anchored to survive rotation to 267.
# Class anchors are BYTE-IDENTICAL to the canonical signatures.yaml; only the
# CsvExportModule members changed (the two that were anchored on rotating
# obfuscated method names R4/tb).

# ─── CSV export module (the z8 implementation) ───────────────────────────────
- name: 'CsvExportModule'
  package: 'net.daylio.modules'
  signatures:
      - signature: '"\.csv"'
        type: regex
        count: 1
  methods:
      # writeCsvFile(String) : File — opens the output file, writes the UTF-8
      # BOM (0xEF 0xBB 0xBF) then the CSV body. Re-anchored on the pure
      # framework descriptor (String in, java.io.File out) WITHOUT the
      # obfuscated method name (was R4 on 252 → rotated to O9 on 267). The
      # descriptor occurs exactly once in this class on both versions.
      - name: 'writeCsvFile'
        signatures:
            - signature: '\(Ljava/lang/String;\)Ljava/io/File;'
              type: regex
              count: 1
      # startCsvExport (was tb()V on 252 → Tb()V on 267) is DROPPED: its body
      # holds no string literal and references only obfuscated, rotating types
      # (vb/yb, q8/r8), and its bare ()V descriptor is ambiguous within the
      # class (two public ()V methods). No rotation-stable unique anchor exists,
      # so per the hardening rule the member is dropped; the class map stands.

# ─── CSV row/header builder (inner AsyncTask of the CSV module) ──────────────
- name: 'CsvExportTask'
  package: 'net.daylio.modules'
  signatures:
      - signature: '"full_date,date,weekday,time,mood,activities,scales,note_title,note"'

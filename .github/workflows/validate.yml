name: Validate maps

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
    group: validate-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    validate:
        name: schema + convention checks (no APK)
        runs-on: ubuntu-latest
        steps:
            - name: Check out this maps repo
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'

            # Tier 1 of the RFC 0001 Decision 4 validation ladder: structural
            # validation against the in-repo JSON Schema, which mirrors
            # rosetta-frida's canonical Zod validator. Self-contained on
            # purpose — a pure *data* repo shouldn't reach into the library
            # repo at CI time. The Zod schema in rosetta-frida stays the schema
            # source of truth; if it bumps, update schema/rosetta-map.schema.json
            # to match (the `schema-version` is also pinned by `const: 2`).
            - name: Validate every map against the schema (ajv)
              run: |
                  shopt -s globstar nullglob
                  found=0
                  for f in maps/**/*.json; do found=$((found + 1)); done
                  if [ "$found" = "0" ]; then
                      echo "::error::no maps found under maps/"
                      exit 1
                  fi
                  npx -y ajv-cli@5 validate --strict=false \
                      -s schema/rosetta-map.schema.json \
                      -d "maps/**/*.json"
                  echo "validated $found map(s)"

            - name: Enforce the maps/<app>/<version_code>.json layout
              # version_code is the authoritative O(1) selection key (RFC 0001
              # Decision 3), so it IS the filename. Catch mislabeled files.
              run: |
                  shopt -s globstar nullglob
                  fail=0
                  for f in maps/**/*.json; do
                      base="$(basename "$f" .json)"
                      vc="$(node -e "process.stdout.write(String(require('./'+process.argv[1]).version_code))" "$f")"
                      if [ "$base" != "$vc" ]; then
                          echo "::error file=$f::filename '$base' != map version_code '$vc' (expected maps/<app>/<version_code>.json)"
                          fail=1
                      fi
                  done
                  exit $fail

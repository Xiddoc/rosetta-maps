name: Validate maps

on:
    # PR-gated validation is the point of this workflow, so it runs on every
    # pull_request targeting the default branch (which covers contributions
    # from any source/feature branch). `push` is limited to the default branch
    # to avoid double-running on PR head pushes. `workflow_dispatch` allows a
    # manual run on any ref. NOTE (L11): if this repo's default branch is ever
    # renamed from `master` (e.g. to `main`), update the branch filters below —
    # they are the one place the default-branch name is hard-coded.
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
    group: validate-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

# Least privilege: this job only reads the checked-out tree. No write
# scopes are needed for structural validation, so grant none beyond read.
permissions:
    contents: read

jobs:
    validate:
        name: schema + convention checks (no APK)
        runs-on: ubuntu-latest
        # A pathological/adversarial map (deeply nested, huge, or one that
        # drives the schema checker into pathological work) must not be able
        # to pin a runner for the 360-minute default ceiling. Bound the whole
        # job; per-step `timeout` guards bound the validator itself below.
        timeout-minutes: 10
        env:
            # DoS/abuse guards (security audit H3). Tune here, in one place.
            MAX_MAP_BYTES: '1048576' # 1 MiB per file
            MAX_MAP_FILES: '2000' # files considered per run
            VALIDATE_TIMEOUT: '60' # wall-clock seconds for check-jsonschema
        steps:
            - name: Check out this maps repo
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            # This repo is data, not a JS library, so its CI carries no JS
            # toolchain: validation runs through a language-neutral JSON Schema
            # checker (check-jsonschema, built on the `jsonschema` library)
            # rather than a Node/ajv stack. Nothing here implies a runtime.
            # Pinned to an exact version so a CI run is reproducible and a new
            # upstream release can't silently change validation behaviour.
            - name: Install check-jsonschema
              run: pipx install 'check-jsonschema==0.37.2'

            # The signatures linter (below) is pure-Python + PyYAML — same
            # language-neutral, no-JS-toolchain style as the schema checker.
            # Pinned so a CI run stays reproducible.
            - name: Install PyYAML (for the signatures linter)
              run: pip install 'PyYAML==6.0.1'

            # DoS/abuse pre-flight (security audit H3). Runs BEFORE the schema
            # checker, which loads each document fully into memory: reject
            # symlinks, oversize files, and thousands-of-files PRs up front so
            # an adversarial contribution can't exhaust runner memory/time.
            - name: Enforce size, count, and symlink caps
              run: |
                  set -euo pipefail
                  shopt -s globstar nullglob

                  mapfiles=(maps/**/*.json)
                  n="${#mapfiles[@]}"
                  if [ "$n" = "0" ]; then
                      echo "::error::no maps found under maps/"
                      exit 1
                  fi

                  if [ "$n" -gt "$MAX_MAP_FILES" ]; then
                      echo "::error::$n map files exceeds the per-run cap of $MAX_MAP_FILES"
                      exit 1
                  fi

                  # Reject symlinks anywhere under maps/ before reading any
                  # file (defends against symlink-to-/dev/zero or out-of-tree
                  # reads).
                  symlinks="$(find maps -type l)"
                  if [ -n "$symlinks" ]; then
                      echo "::error::symlinks are not allowed under maps/:"
                      echo "$symlinks"
                      exit 1
                  fi

                  fail=0
                  for f in "${mapfiles[@]}"; do
                      bytes="$(wc -c < "$f")"
                      if [ "$bytes" -gt "$MAX_MAP_BYTES" ]; then
                          echo "::error file=$f::$bytes bytes exceeds the per-file cap of $MAX_MAP_BYTES bytes"
                          fail=1
                      fi
                  done
                  if [ "$fail" != "0" ]; then
                      exit 1
                  fi
                  echo "size/count/symlink caps OK for $n map(s)"

            # RFC 0001 Decision 4, tier 1: structural validation against the
            # canonical map schema. This repo OWNS that schema
            # (schema/rosetta-map.schema.json) — it is the language-neutral
            # source of truth for the `schema_version: 2` format, and the
            # rosetta-frida (TS) and rosetta-xposed (Kotlin) adapters are
            # CLIENTS that track it. So CI validates maps against its own
            # schema: self-contained, no cross-repo checkout, and no
            # drift-prone mirror to keep in sync. The validator runs under a
            # wall-clock guard so a pathological doc can't hang the step.
            - name: Validate every map against the canonical schema
              run: |
                  set -euo pipefail
                  shopt -s globstar nullglob
                  mapfiles=(maps/**/*.json)
                  if [ "${#mapfiles[@]}" = "0" ]; then
                      echo "::error::no maps found under maps/"
                      exit 1
                  fi
                  timeout "$VALIDATE_TIMEOUT" check-jsonschema \
                      --schemafile schema/rosetta-map.schema.json \
                      "${mapfiles[@]}"
                  echo "validated ${#mapfiles[@]} map(s) against the canonical schema"

            # Schema-DRIFT guard. The published maps above prove the schema
            # ACCEPTS good maps, but nothing proved it still REJECTS bad ones —
            # so a constraint could silently loosen (e.g. `minLength: 1` on
            # `obfuscated` dropped) and CI would stay green. These curated
            # samples pin both directions: every map under schema/samples/valid/
            # MUST pass and every map under schema/samples/invalid/ MUST be
            # rejected (each violates exactly one enforced constraint).
            #
            # Cross-client coverage is PARTIAL, not total: the rosetta-frida
            # (Zod) and rosetta-xposed (Kotlin) client validators independently
            # assert ONLY the constraints that appear in their shared
            # conformance `validation.json` fixture — currently the `minLength:1`
            # non-empty `obfuscated` rule (class/method/field) and the
            # `schema_version` hard-gate (a `schema_version: 1` map is rejected).
            # Those constraints are pinned in all three hand-maintained copies of
            # the format and can't drift apart unnoticed. The REMAINING invalid
            # samples here (e.g. `bad-app-pattern`, `method-missing-signature`,
            # `missing-version-code`) are pinned ONLY by this maps-CI step today;
            # widening the shared fixture to cover them is tracked follow-up.
            - name: Schema accepts valid samples and rejects invalid samples
              run: |
                  set -euo pipefail
                  shopt -s globstar nullglob
                  schema=schema/rosetta-map.schema.json

                  valid=(schema/samples/valid/*.json)
                  invalid=(schema/samples/invalid/*.json)
                  if [ "${#valid[@]}" = "0" ] || [ "${#invalid[@]}" = "0" ]; then
                      echo "::error::expected samples under schema/samples/{valid,invalid}/"
                      exit 1
                  fi

                  # Every valid sample MUST validate.
                  timeout "$VALIDATE_TIMEOUT" check-jsonschema \
                      --schemafile "$schema" "${valid[@]}"
                  echo "all ${#valid[@]} valid sample(s) accepted"

                  # Every invalid sample MUST be rejected (one at a time, so a
                  # single accidentally-valid sample is pinpointed).
                  fail=0
                  for f in "${invalid[@]}"; do
                      if timeout "$VALIDATE_TIMEOUT" check-jsonschema \
                          --schemafile "$schema" "$f" >/dev/null 2>&1; then
                          echo "::error file=$f::schema ACCEPTED an invalid sample (a constraint may have loosened)"
                          fail=1
                      fi
                  done
                  if [ "$fail" != "0" ]; then
                      exit 1
                  fi
                  echo "all ${#invalid[@]} invalid sample(s) correctly rejected"

            - name: Enforce the maps/<app>/<version_code>.json layout
              # version_code is the authoritative O(1) selection key (RFC 0001
              # Decision 3), so it IS the filename. Catch mislabeled files.
              # A SINGLE python pass over every map (instead of forking one
              # interpreter per file) also asserts version_code matches
              # ^[0-9]+$ and that each resolved path stays under maps/.
              run: |
                  set -euo pipefail
                  shopt -s globstar nullglob
                  mapfiles=(maps/**/*.json)
                  if [ "${#mapfiles[@]}" = "0" ]; then
                      echo "::error::no maps found under maps/"
                      exit 1
                  fi
                  python3 - "${mapfiles[@]}" <<'PY'
                  import json
                  import os
                  import re
                  import sys

                  VC_RE = re.compile(r"^[0-9]+$")
                  fail = 0
                  maps_root = os.path.realpath("maps")

                  for f in sys.argv[1:]:
                      # Path containment: the resolved path must stay under maps/.
                      real = os.path.realpath(f)
                      if not (real == maps_root or real.startswith(maps_root + os.sep)):
                          print(f"::error file={f}::resolves outside maps/ ({real})")
                          fail = 1
                          continue
                      base = os.path.splitext(os.path.basename(f))[0]
                      try:
                          with open(f, encoding="utf-8") as fh:
                              doc = json.load(fh)
                      except (OSError, ValueError) as exc:
                          print(f"::error file={f}::could not parse JSON: {exc}")
                          fail = 1
                          continue
                      vc = doc.get("version_code")
                      vc_str = str(vc)
                      # Must be a JSON integer AND spell out as ^[0-9]+$ (no
                      # signs, no floats, no bools — bool is an int subclass).
                      if isinstance(vc, bool) or not isinstance(vc, int) or not VC_RE.match(vc_str):
                          print(f"::error file={f}::version_code '{vc}' is not a non-negative integer")
                          fail = 1
                          continue
                      if base != vc_str:
                          print(
                              f"::error file={f}::filename '{base}' != map version_code "
                              f"'{vc_str}' (expected maps/<app>/<version_code>.json)"
                          )
                          fail = 1

                  sys.exit(fail)
                  PY
                  echo "layout + version_code conventions OK"

            # signatures/ is the SOURCE OF TRUTH (AGENTS.md) from which maps are
            # reproduced, so it must be validated too — historically only
            # maps/**/*.json was. This step lints every signatures.yaml for the
            # minimal sigmatcher-dialect structure (required top-level keys,
            # known rule/member/signature shapes). It reads ONLY the committed
            # YAML — no APK is fetched or read — so Hard rule 3 (no APK in CI)
            # is preserved. The linter ships a built-in self-test (accept/reject
            # fixtures) so the linter itself can't silently rot; we run that
            # first, then lint the real files.
            - name: Lint signatures (sigmatcher dialect) + linter self-test
              run: |
                  set -euo pipefail
                  shopt -s globstar nullglob

                  python3 scripts/lint_signatures.py --self-test

                  sigfiles=(signatures/**/signatures.yaml templates/signatures.template.yaml)
                  if [ "${#sigfiles[@]}" = "0" ]; then
                      echo "::error::no signatures files found under signatures/"
                      exit 1
                  fi
                  python3 scripts/lint_signatures.py "${sigfiles[@]}"
                  echo "linted ${#sigfiles[@]} signature file(s)"
